<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>医美医生的MBTI｜知晏 GoGo</title><style>:root{--ink:#1c1814;--ink-soft:#4a3f36;--ink-dim:#9a8878;--cream:#faf7f2;--warm:#f4ede3;--card:#fff;--border:#e6ddd2;--border-s:#d4c8ba;--accent:#8b5e3c;--accent-l:#c49a72;--accent-xl:#f0e4d4;--sel:#3d2b1a;--sel-bg:#ede4da;--fn-serif:'STSong','华文宋体','SimSun','FangSong',Georgia,serif;--fn-body:'PingFang SC','Microsoft YaHei','Hiragino Sans GB',sans-serif;}*{margin:0;padding:0;box-sizing:border-box;}body{background:var(--cream);color:var(--ink);font-family:var(--fn-body);min-height:100vh;}#pb{position:fixed;top:0;left:0;right:0;height:3px;z-index:200;background:var(--border);}#pbf{height:100%;background:var(--accent);transition:width .4s ease;width:0;}#cover{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:3rem 1.5rem 5rem;position:relative;overflow:hidden;}#cover::before{content:'';position:absolute;top:-120px;right:-80px;width:460px;height:460px;border-radius:50%;background:radial-gradient(circle,rgba(196,154,114,.14) 0%,transparent 65%);pointer-events:none;}#cover::after{content:'';position:absolute;bottom:-80px;left:-70px;width:340px;height:340px;border-radius:50%;background:radial-gradient(circle,rgba(139,94,60,.09) 0%,transparent 65%);pointer-events:none;}.eye{font-size:.68rem;letter-spacing:.22em;text-transform:uppercase;color:var(--accent);margin-bottom:1.6rem;opacity:.85;font-family:var(--fn-body);}.ctitle{font-family:var(--fn-serif);font-size:clamp(2rem,7vw,3.4rem);line-height:1.2;text-align:center;color:var(--ink);margin-bottom:.6rem;letter-spacing:.02em;}.ctitle em{font-style:italic;color:var(--accent);}.cdesc{font-size:.93rem;color:var(--ink-soft);text-align:center;max-width:420px;line-height:1.85;margin-bottom:2.4rem;}.cpills{display:flex;gap:.7rem;margin-bottom:2.8rem;flex-wrap:wrap;justify-content:center;}.cpill{font-size:.7rem;color:var(--ink-dim);background:var(--warm);border:1px solid var(--border);padding:.28rem .85rem;border-radius:20px;}.btn-s{background:var(--accent);color:#fff;border:none;padding:.88rem 2.6rem;border-radius:60px;font-size:.95rem;font-family:var(--fn-body);cursor:pointer;transition:.2s;letter-spacing:.04em;box-shadow:0 4px 18px rgba(139,94,60,.26);}.btn-s:hover{background:var(--sel);transform:translateY(-2px);box-shadow:0 6px 22px rgba(61,43,26,.3);}.cnote{margin-top:1.4rem;font-size:.7rem;color:var(--ink-dim);text-align:center;}#quiz{display:none;max-width:660px;margin:0 auto;padding:1rem 1rem 5rem;}.qhdr{text-align:center;padding:2rem 0 1.2rem;}.qctr{font-size:.68rem;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-dim);margin-bottom:.3rem;}.qphase{font-family:var(--fn-serif);font-size:1rem;color:var(--ink-soft);font-style:italic;}.qcard{background:var(--card);border-radius:20px;border:1px solid var(--border);padding:1.8rem 1.6rem 1.5rem;margin-bottom:1.1rem;box-shadow:0 2px 14px rgba(28,24,20,.05);animation:fadeUp .3s ease both;}@keyframes fadeUp{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}.qnum{font-size:.6rem;letter-spacing:.15em;text-transform:uppercase;color:var(--accent);margin-bottom:.55rem;font-weight:600;}.qtext{font-size:.97rem;font-weight:600;color:var(--ink);line-height:1.6;margin-bottom:1.1rem;}.opts{display:flex;flex-direction:column;gap:.5rem;}.opt{display:flex;align-items:flex-start;gap:.8rem;padding:.72rem 1rem;border:1px solid var(--border);border-radius:11px;background:var(--cream);cursor:pointer;transition:.15s;font-size:.87rem;color:var(--ink-soft);line-height:1.55;}.opt:hover{background:var(--accent-xl);border-color:var(--accent-l);color:var(--ink);}.opt.sel{background:var(--sel-bg);border-color:var(--accent);color:var(--sel);font-weight:600;}.opt input{display:none;}.olet{flex-shrink:0;width:21px;height:21px;border-radius:50%;border:1.5px solid var(--border-s);background:#fff;display:flex;align-items:center;justify-content:center;font-size:.62rem;font-weight:700;color:var(--ink-dim);transition:.15s;margin-top:1px;}.opt.sel .olet{background:var(--accent);border-color:var(--accent);color:#fff;}.sbwrap{padding:.5rem 0 1rem;text-align:center;}.btn-sub{background:var(--accent);color:#fff;border:none;padding:.85rem 2.4rem;border-radius:60px;font-size:.95rem;font-family:var(--fn-body);cursor:pointer;transition:.2s;letter-spacing:.04em;box-shadow:0 4px 18px rgba(139,94,60,.22);}.btn-sub:hover{background:var(--sel);transform:translateY(-1px);}#result{display:none;max-width:660px;margin:0 auto;padding:1.5rem 1rem 5rem;}.rhero{background:var(--card);border-radius:22px;border:1px solid var(--border);overflow:hidden;margin-bottom:1rem;box-shadow:0 4px 24px rgba(28,24,20,.07);}.rhtop{padding:2.2rem 2rem 1.6rem;background:linear-gradient(135deg,var(--warm) 0%,var(--accent-xl) 100%);border-bottom:1px solid var(--border);}.rlbl{font-size:.62rem;letter-spacing:.18em;text-transform:uppercase;color:var(--accent);margin-bottom:.5rem;}.rmain{font-family:var(--fn-serif);font-size:clamp(1.9rem,5.5vw,2.7rem);color:var(--ink);line-height:1.2;margin-bottom:.35rem;}.rsub{font-size:.82rem;color:var(--ink-soft);margin-bottom:1rem;}.rtag{font-size:.97rem;color:var(--ink-soft);font-style:italic;line-height:1.65;padding:.8rem 1rem;background:rgba(255,255,255,.55);border-radius:10px;border-left:3px solid var(--accent-l);}.rbody{padding:1.8rem 2rem;}.rsec{margin-bottom:1.6rem;}.rsl{font-size:.6rem;letter-spacing:.15em;text-transform:uppercase;color:var(--accent-l);font-weight:700;margin-bottom:.6rem;}.rtxt{font-size:.91rem;line-height:1.78;color:var(--ink-soft);}.rlist{list-style:none;display:flex;flex-direction:column;gap:.42rem;}.rlist li{font-size:.89rem;line-height:1.6;color:var(--ink-soft);padding:.52rem .9rem;background:var(--warm);border-radius:10px;display:flex;gap:.6rem;align-items:flex-start;}.rlist li::before{content:'·';color:var(--accent);font-size:1.1rem;line-height:1.25;flex-shrink:0;}.sting{background:var(--sel-bg);border-radius:13px;padding:1.1rem 1.3rem;border-left:3px solid var(--accent);font-size:.95rem;line-height:1.72;color:var(--sel);font-style:italic;}.hook{background:linear-gradient(135deg,var(--warm),var(--accent-xl));border-radius:13px;padding:1.2rem 1.4rem;border:1px solid var(--border-s);font-size:.91rem;line-height:1.78;color:var(--ink-soft);}.hook strong{color:var(--accent);}.verb-row{display:flex;flex-wrap:wrap;gap:.5rem;margin-bottom:.6rem;}.verb-chip{padding:.3rem .85rem;border-radius:20px;font-size:.78rem;border:1px solid var(--border);background:var(--warm);color:var(--ink-soft);transition:.15s;}.verb-chip.active{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:600;}.rcta{background:var(--card);border-radius:20px;border:1px solid var(--border);padding:1.6rem 1.8rem;margin-bottom:1rem;text-align:center;box-shadow:0 2px 12px rgba(28,24,20,.04);}.rcta p{font-size:.88rem;color:var(--ink-soft);line-height:1.72;margin-bottom:1.2rem;}.ctabtns{display:flex;gap:.8rem;justify-content:center;flex-wrap:wrap;}.btn-cp{background:transparent;border:1px solid var(--border-s);padding:.65rem 1.4rem;border-radius:40px;font-size:.81rem;color:var(--ink-soft);cursor:pointer;transition:.15s;font-family:var(--fn-body);}.btn-cp:hover{background:var(--warm);border-color:var(--accent-l);}.btn-ct{background:var(--accent);color:#fff;border:none;padding:.65rem 1.4rem;border-radius:40px;font-size:.81rem;cursor:pointer;transition:.15s;font-family:var(--fn-body);box-shadow:0 3px 12px rgba(139,94,60,.22);}.btn-ct:hover{background:var(--sel);}.rfooter{text-align:center;font-size:.7rem;color:var(--ink-dim);line-height:1.8;padding:.5rem 0;}@media(max-width:580px){.rbody{padding:1.4rem 1.2rem;}.rhtop{padding:1.8rem 1.3rem 1.4rem;}.rcta{padding:1.3rem 1.2rem;}.qcard{padding:1.5rem 1.2rem 1.3rem;}}</style></head><body><div id="pb"><div id="pbf"></div></div><div id="cover"><div class="eye">知晏 GoGo · 医美决策转化</div><h1 class="ctitle">医美医生的 <em>MBTI</em></h1><p class="cdesc">不是测测玩玩。<br>是帮你找到你天然的判断底色——<br>看见自己，才能被对的人看见。</p><div class="cpills"><span class="cpill">12道场景题</span><span class="cpill">约3分钟</span><span class="cpill">8种判断风格</span><span class="cpill">主＋副类型</span></div><button class="btn-s" onclick="startQuiz()">开始识别我的风格</button><p class="cnote">为医美医生设计 · 知晏 GoGo 出品</p></div><div id="quiz"><div class="qhdr"><div class="qctr" id="qctr">已完成 0 / 12</div><div class="qphase" id="qphase">你的判断底色</div></div><div id="qarea"></div><div class="sbwrap" id="sbwrap" style="display:none;"><button class="btn-sub" onclick="showResult()">查看我的风格报告</button></div></div><div id="result"></div><script>const T={0:{name:"守门人",verb:"守护",tagline:"你守住的每一个「不」，都是对客户真正的保护",sting:"你不是不敢做，是你怕错。但你守住的那些「不」，正是整个行业里最稀缺的东西——只是你还没学会把它讲出来。",core:"你的判断底色是安全边界。面对每一个方案，你第一个念头是「这样做会不会出问题」。你主动劝退、不轻易上量、对风险高度敏感——这是整个行业里最稀缺的专业自律。",pros:["几乎不会出现严重并发症，纠纷率极低","对「什么不该做」的判断极其准确","客户长期信任感稳定，复购质量高"],cons:["客户觉得你「不太想接我」，流失到更敢做的医生那里","你的保守容易被同行误读为技术不足","内容只讲「不能做」，没有棱角，观众记不住你"],hook:"你有没有遇到过这种情况——<br><br>客户想做一个你觉得不对的项目，你说了不建议。她当面点头，然后去了别家做了。你看到她发的朋友圈，心里说：我早就知道会这样。<br><br>但你没说出来的那些话，才是你最值钱的东西。<br><br><strong>你的问题不是判断力，是你的判断力还没有变成别人听得见的声音。</strong>",clients:"被过度营销坑过、极度重视安全感、追求长期稳妥的客户。"},1:{name:"掌舵者",verb:"引领",tagline:"你的判断，就是客户最需要的答案",sting:"你享受被信任的感觉，但你很少问客户「你想要什么」。",core:"你的判断底色是给出最优解。你不喜欢客户在你面前犹豫——你会直接告诉她该怎么做。这种决断力让效率极高，方向极清晰，但也让某些客户感到被忽视。",pros:["决策效率极高，客户不需要在你这里纠结","方案体系完整，有权威感","适合需要被告知「正确答案」的理性客户"],cons:["强势过头，敏感型客户会被推走","客户当面说好，背后去了「更愿意听她说话」的医生","内容容易变成说教，观众觉得你高高在上"],hook:"你有没有遇到过这种情况——<br><br>你给了客户一个你认为完全正确的方案，她听完说「我再想想」。过了两周，你发现她去了另一个你觉得审美不如你的医生那里。<br><br>你知道她的选择不是最好的，但你说不清楚她为什么走。<br><br><strong>你的判断很值钱——但客户要先感觉到「被听见」，才愿意被你引领。</strong>",clients:"希望被直接告知「怎么做最好」、愿意放弃决策权的高度信任型客户。"},2:{name:"摆渡人",verb:"共情",tagline:"你让客户感到：这里是安全的",sting:"客户爱你，但客户爱的不是你的专业，是你给的情绪价值。",core:"你的判断底色是先处理情绪，再处理问题。你会在面诊开始先问「你最近怎么样」，你能感受到客户说出口背后的那句话。这种共情力是极稀缺的临床能力——但用错地方会消耗你。",pros:["客户粘性极高，转介绍率惊人","能听到客户最真实的需求","能识别「表面需求」背后的「真实需求」，减少后悔率"],cons:["容易被情感依赖型客户消耗，边界模糊","内容太「暖」，缺乏专业锐度","价值都消耗在「让客户感觉好」上，而不是让她做对的决定"],hook:"你有没有遇到过这种情况——<br><br>一个跟了你三年的老客户，有一次你委婉拒绝了她一个不合理的要求。她之后慢慢就不来了。你知道她去了哪，你也知道那个医生不如你，但你没有办法说什么。<br><br><strong>你的共情是护城河，但河里也要有护栏——你的「温柔」和你的「判断」，需要同时让客户看见。</strong>",clients:"敏感、有过不好体验、需要大量情绪支持才能做决定的客户。"},3:{name:"解题者",verb:"解构",tagline:"你让客户真正搞明白了自己",sting:"你讲得都对，但客户听完去了那个「讲得没你清楚」的人那里。",core:"你的判断底色是给客户建立认知。你会花大量时间解释「为什么」——为什么这样老化、为什么这个顺序、为什么现在不合适。你给的是逻辑，不只是方案。",pros:["能把复杂问题拆成清晰的决策链条","理性型客户极度信任你","同行认可度高，适合做学术分享"],cons:["忽略客户的感性需求，逻辑赢了，关系输了","内容太干太硬，普通人不想听","被对标成「会讲但不会做」"],hook:"你有没有遇到过这种情况——<br><br>你花了半小时跟客户解释清楚了她的问题，她听完说「你讲得太清楚了，我回去想想」。然后她选了另一个医生——那个医生什么都没解释，只是让她「感觉很被理解」。<br><br>你赢了逻辑，输了关系。<br><br><strong>你的逻辑是你最大的资产——但它需要一个有温度的入口，才能真正进入客户心里。</strong>",clients:"做过大量功课、希望被讲透、不想被哄的理性型客户。"},4:{name:"减法师",verb:"收敛",tagline:"你做的最好的，是你没有多做的那些",sting:"你心里知道「少即是多」，但客户总觉得你「不够」。",core:"你的判断底色是自然协调。你会主动减法，把客户想做的方案「做小」——不是因为技术保守，是因为你的审美标准里，过度干预是一种失败。",pros:["长期效果最自然，客户不容易后悔","同行愿意转诊给你，尤其是修复类","客户生命周期长，隐性复购率高"],cons:["被客户误解为「技术保守」或「能力不足」","在营销上天然吃亏，因为你不鼓励多做","内容视觉冲击力弱，被更「夸张」的对比图淹没"],hook:"你有没有遇到过这种情况——<br><br>客户想做一个量大一点的方案，你建议她做小一点。她有点犹豫，最后还是去了另一家，做了她最初想要的那个量。短期效果还不错，她发了朋友圈。你看着觉得——再过两年就知道了。<br><br><strong>你看见的是三年后，客户看见的是明天的对比图——你需要把「慢慢来」翻译成她愿意等的理由。</strong>",clients:"追求自然感、害怕被过度营销、对「网红脸」有警惕的客户。"},5:{name:"侦探师",verb:"诊断",tagline:"你看见了别人看不见的真正问题",sting:"你帮客户把问题看清楚了。然后她带着这份清晰，去找别人执行了。",core:"你的判断底色是找到真正的问题。你会说「你以为你的问题是A，其实是B」——这是整个行业里最难得的诊断能力。你不满足于解决表面的问题，你要找到根本的原因。",pros:["对问题归因极其精准，客户觉得「终于有人说明白了」","能建立判断权威，客户有问题第一个想到你","适合做复杂案例，同行认可度高"],cons:["只诊断不治疗，客户拿着你的诊断去找别人执行","内容太技术，普通人听不懂","被对标成「会判断但不会操作」"],hook:"你有没有遇到过这种情况——<br><br>客户说想改鼻子，你跟她聊了20分钟，发现她真正在意的是整体轮廓，不是鼻子。你帮她把真正的问题找出来了。然后她说：「那我应该找谁做轮廓？」<br><br>你是最好的导航，但她去找了别人开车。<br><br><strong>诊断是在建立信任，给方案才是成交的开始——让客户知道你不只会找问题，你也会解决它。</strong>",clients:"已经被各种说法弄晕、想先「搞清楚自己到底怎么回事」的客户。"},6:{name:"调音师",verb:"协调",tagline:"你看见的是整体，客户只看见一条沟",sting:"你以为客户在找「审美」，其实她在找「被允许」——允许做这个选择，允许成为这个自己。",core:"你的判断底色是整体协调。你不做「突出某一个部位」的方案，你追求的是「整个人更对了」的感觉。你能一眼看出比例的问题，看见局部调整对整体的影响——这是高难度的审美判断力。",pros:["做出来的结果耐看、持久，不容易过时","客户在你这里不会「越做越不像自己」","高口碑，老客户介绍率高"],cons:["你的作品不适合做「对比图」——变化是整体微妙的，传播力弱","客户可能觉得「做了但不明显」——虽然这恰恰是你的成功","「整体感」的概念很难用短视频讲清楚"],hook:"你有没有遇到过这种情况——<br><br>你做完一个案子，自己很满意，整体很协调。客户回去发了朋友圈，说「感觉变化不大」。但你们共同认识的朋友说：「她整个人感觉不一样了，说不出哪里。」<br><br>你的作品最好的那部分，恰恰是最难被看见的。<br><br><strong>你需要帮客户建立新的评价标准——让她明白「说不出哪里变了，但整个人变了」才是最高的成功。</strong>",clients:"有品位、追求精致感、抗拒「网红脸」、想保留个人特质的客户。"},7:{name:"领航员",verb:"规划",tagline:"你管理的不是一个项目，是一条老化曲线",sting:"你的客户信任你，愿意跟你很久。但「被信任」不等于「被看见」——你的护城河里只有老客户，外面的人根本不知道你存在。",core:"你的判断底色是时间轴。你会说「你现在的问题先不做，因为三年后做更值」——这是整个行业里最难得的战略视角。你不解决当下的问题，你管理客户整个老化周期。",pros:["客户生命价值极高，复购稳定","你比客户更了解她的脸，方案连贯性强","转介绍来的客户，往往也是「想长期跟一个人」的类型"],cons:["获客慢，前期大量投入建立信任","容易被短期流量型医生抢单，尤其在新客户第一次选择时","内容偏「延续性」，缺乏新鲜感，传播力弱"],hook:"你有没有遇到过这种情况——<br><br>一个跟了你五年的老客户，有一次在没有告诉你的情况下，去别家做了一个项目。回来找你修复的时候说：「我就是想试试不一样的感觉。」你比任何人都更了解她的脸，但「了解」没有变成「被需要」。<br><br><strong>你的护城河里只有老客户——你需要让外面第一次见到你的人，也能感受到你看的是他们的十年。</strong>",clients:"有长期主义认知、不想反复换医生、愿意为「对的人」付出时间成本的客户。"}};const VERBS=[{i:0,label:"守门人｜守护"},{i:1,label:"掌舵者｜引领"},{i:2,label:"摆渡人｜共情"},{i:3,label:"解题者｜解构"},{i:4,label:"减法师｜收敛"},{i:5,label:"侦探师｜诊断"},{i:6,label:"调音师｜协调"},{i:7,label:"领航员｜规划"}];const QS=[{phase:"你的第一反应",t:"新客户刚坐下，还没开口——你脑子里冒出来的第一句话更可能是哪个？",o:["她这个情况，有个地方我不会轻易碰","我已经知道她该做什么了","她今天的状态怎么样，情绪对不对","她对自己的问题了解多少，有没有被误导过"],m:[0,1,2,3]},{phase:"你的第一反应",t:"客户说「我觉得我需要改变一下，但说不清楚从哪里开始」——你第一个念头是？",o:["先做最小的调整，看看效果","她说「改变」，但真正困扰她的是什么？","从整体比例看，问题不在她说的那里","她现在的状态，是不是到了该做的节点"],m:[4,5,6,7]},{phase:"最不想听到的话",t:"做完一个方案，你最不想听到客户说哪句话？",o:["「好像没什么变化，是不是做少了？」","「你就直接告诉我该做什么吧，我听你的」","「我做完了才知道，原来我要解决的不是这个问题」","「我觉得不够自然，感觉有点过了」"],m:[0,2,5,6]},{phase:"最不想听到的话",t:"同行私下评价你，你最不想被说哪句？",o:["「她太强势了，客户跟她说话没有空间」","「什么都讲得很清楚，但客户还是走了」","「太保守了，好多能做的她都不做」","「她的老客户很稳，但圈子太小出不去」"],m:[1,3,4,7]},{phase:"你最有成就感的时刻",t:"哪种情况让你做完之后最有成就感？",o:["我判断不能做，她没做，后来回来说谢谢我","我给了方案，她全程配合，结果很好","她说：你是第一个真正听我说话的医生","做完没人说哪里变了，但她说整个人对了"],m:[0,1,2,6]},{phase:"别人眼中的你",t:"一个认识你多年的同行，她最可能怎么描述你？",o:["「她很敢说不，但说不的时候你会信她」","「她做事很稳，但客户都跟得很久」","「她看整体，不会只盯着你说的那个地方」","「跟她聊完你会清楚自己该怎么决定」"],m:[0,7,6,4]},{phase:"遇到分歧时",t:"客户坚持要做一个你觉得不对的项目，你通常怎么处理？",o:["明确说不建议，把风险讲清楚，最终让她自己决定","先理解她为什么想做，再慢慢引导","问她「你最终想解决的是什么」，往往问题不在这里","把这个项目放到她未来三年的计划里来讨论"],m:[0,2,5,7]},{phase:"遇到分歧时",t:"客户拿着网红模板来说「我要这个效果」，你第一反应是？",o:["直接告诉她这个不适合，我给你看适合的","问她为什么喜欢这张图，她真正想要的是什么感觉","这张图的感觉我理解，但不一定适合你这张脸","她的问题不在图上说的那里，整体比例才是关键"],m:[1,3,4,6]},{phase:"你最顺手的时刻",t:"哪种客户让你做完觉得「这次做得最对」？",o:["理性、不废话，我说什么她配合什么","做了大量功课来的，我们可以直接聊深的","在别的地方做过，觉得问题没解决，来找我重新看","跟我说「我要长期管理」，不急着看结果"],m:[1,3,5,7]},{phase:"做完之后的反思",t:"老客户突然不来了，你心里最先出现的是哪种感受？",o:["是不是哪次沟通让她感觉不被理解了","是不是她觉得我做得太保守，去找敢做的了","是不是我没帮她看清楚她真正想要的是什么","我知道她去哪了，但她还没到该来的那个节点"],m:[2,4,6,7]},{phase:"你理想中的客户关系",t:"你最希望老客户怎么介绍你给朋友？",o:["「她不会让你乱做，但她说不做就是真的不能做」","「去找她，她真的会听你说话，不只是看你的脸」","「她很克制，但做出来特别自然，不会显」","「她眼光很准，知道你真正适合什么」"],m:[0,2,4,6]},{phase:"给自己一个关键词",t:"如果给你的执业风格定一个关键词，你更认同哪个？",o:["笃定——我知道什么是对的，我来给方向","清醒——我帮客户真正搞明白她自己的问题","精准——我能找到别人没看见的根本原因","长远——我看的不是现在，是她五年后的样子"],m:[1,3,5,7]}];let answered=0;function pb(n){document.getElementById('pbf').style.width=n+'%';}function startQuiz(){document.getElementById('cover').style.display='none';document.getElementById('quiz').style.display='block';render();window.scrollTo(0,0);}function render(){const area=document.getElementById('qarea');area.innerHTML='';QS.forEach((q,qi)=>{const card=document.createElement('div');card.className='qcard';card.style.animationDelay=(qi*.03)+'s';card.dataset.qi=qi;card.innerHTML=`<div class="qnum">Q${qi+1} · ${q.phase}</div><div class="qtext">${q.t}</div><div class="opts" id="o${qi}"></div>`;area.appendChild(card);const od=card.querySelector('#o'+qi);['A','B','C','D'].forEach((L,oi)=>{const lbl=document.createElement('label');lbl.className='opt';lbl.innerHTML=`<input type="radio" name="q${qi}" value="${oi}"><span class="olet">${L}</span><span>${q.o[oi]}</span>`;lbl.querySelector('input').addEventListener('change',()=>pick(qi,oi,lbl,od));od.appendChild(lbl);});});upd();}function pick(qi,oi,lbl,od){od.querySelectorAll('.opt').forEach(l=>l.classList.remove('sel'));lbl.classList.add('sel');answered=document.querySelectorAll('input[type=radio]:checked').length;upd();}const PHASES=['你的第一反应','最不想听到的话','你最有成就感的时刻','遇到分歧时'];function upd(){pb(Math.round(answered/QS.length*100));document.getElementById('qctr').textContent=`已完成 ${answered} / ${QS.length}`;document.getElementById('qphase').textContent=PHASES[Math.min(Math.floor(answered/3),3)];document.getElementById('sbwrap').style.display=answered===QS.length?'block':'none';}function calc(){const sc=[0,0,0,0,0,0,0,0];QS.forEach((q,qi)=>{const inp=document.querySelector(`input[name="q${qi}"]:checked`);if(inp)sc[q.m[+inp.value]]++;});const sorted=[...sc.map((s,i)=>({s,i}))].sort((a,b)=>b.s-a.s);let mi=sorted[0].i,si=sorted[1].i;if(sorted[0].s===sorted[1].s){const COMP={0:6,1:2,2:1,3:5,4:7,5:3,6:0,7:4};for(let k=1;k<sorted.length;k++){if(sorted[k].s===sorted[0].s&&sorted[k].i===COMP[mi]){si=sorted[k].i;break;}}}return{sc,mi,si};}function showResult(){if(document.querySelectorAll('input[type=radio]:checked').length!==QS.length){alert('请完成全部12道题目，再查看结果 :)');return;}const{sc,mi,si}=calc();const m=T[mi],s=T[si];const chips=VERBS.map(v=>`<span class="verb-chip${v.i===mi?' active':''}">${v.label}</span>`).join('');const bars=sc.map((v,i)=>{const w=Math.round(v/QS.length*100);const col=i===mi?'var(--accent)':i===si?'var(--accent-l)':'var(--border-s)';return `<div style="display:flex;align-items:center;gap:.55rem;margin-bottom:.42rem;"><span style="font-size:.68rem;color:var(--ink-dim);width:46px;flex-shrink:0;">${T[i].name}</span><div style="flex:1;height:5px;background:var(--border);border-radius:3px;overflow:hidden;"><div style="height:100%;width:${w}%;background:${col};border-radius:3px;transition:.5s;"></div></div><span style="font-size:.64rem;color:var(--ink-dim);width:14px;text-align:right;">${v}</span></div>`;}).join('');document.getElementById('quiz').style.display='none';const el=document.getElementById('result');el.style.display='block';el.innerHTML=`<div class="rhero"><div class="rhtop"><div class="rlbl">你的主类型</div><div class="rmain">${m.name}</div><div class="rsub">副类型：${s.name} &nbsp;·&nbsp; 核心动词：${m.verb}</div><div class="rtag">${m.tagline}</div></div><div class="rbody"><div class="rsec"><div class="rsl">8种判断风格的核心动词</div><div class="verb-row">${chips}</div><div class="rtxt" style="font-size:.8rem;color:var(--ink-dim);">你的底色是「${m.verb}」，副色彩是「${s.verb}」</div></div><div class="rsec"><div class="rsl">一句话刺痛</div><div class="sting">${m.sting}</div></div><div class="rsec"><div class="rsl">你的底色</div><div class="rtxt">${m.core}</div></div><div class="rsec"><div class="rsl">你的优势</div><ul class="rlist">${m.pros.map(x=>`<li>${x}</li>`).join('')}</ul></div><div class="rsec"><div class="rsl">要留意的陷阱</div><ul class="rlist">${m.cons.map(x=>`<li>${x}</li>`).join('')}</ul></div><div class="rsec"><div class="rsl">你卡住的真正原因</div><div class="hook">${m.hook}</div></div><div class="rsec"><div class="rsl">最适合你的客户</div><div class="rtxt">${m.clients}</div></div><div class="rsec"><div class="rsl">得分分布</div><div style="padding:.2rem 0;">${bars}</div></div></div></div><div class="rcta"><p>这是一版初步识别结果。<br>你的主副类型背后还有一整套内容方向——<br><strong style="color:var(--accent);">测出类型只是第一步，用对类型才是真正的开始。</strong></p><div class="ctabtns"><button class="btn-cp" onclick="doCopy(${mi},${si})">复制我的报告</button><button class="btn-ct" onclick="doContact()">填写结果 · 领取完整报告</button></div></div><div class="rfooter">知晏 GoGo · 帮医生先看见自己，再被对的人看见<br>医美决策转化 · 医生的MBTI · 8种判断风格</div>`;pb(100);window.scrollTo({top:0,behavior:'smooth'});}function doCopy(mi,si){const m=T[mi],s=T[si];const txt=`【医美医生的MBTI · 知晏 GoGo】\n\n主类型：${m.name}（核心动词：${m.verb}）\n副类型：${s.name}（核心动词：${s.verb}）\n\n${m.tagline}\n\n一句话刺痛：\n${m.sting}\n\n你的底色：\n${m.core}\n\n优势：\n${m.pros.map(x=>'· '+x).join('\n')}\n\n要留意的陷阱：\n${m.cons.map(x=>'· '+x).join('\n')}\n\n你卡住的真正原因：\n${m.hook.replace(/<[^>]+>/g,'')}\n\n最适合你的客户：\n${m.clients}\n\n——\n知晏 GoGo · 帮医生先看见自己，再被对的人看见\n微信：15887817853`;navigator.clipboard.writeText(txt).then(()=>alert('已复制到剪贴板 ✓')).catch(()=>alert('请手动复制'));}function doContact(){window.open('https://mcnjjg62zk26.feishu.cn/share/base/form/shrcnunsIyrUFk1euSHgqbvpM1b','_blank');}</script></body></html>
